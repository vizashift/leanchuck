name: Release

on:
  push:
    branches: [main]

# Don't let two releases run at once.
concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Publish to npm — only when package.json version isn't already published.
  # ---------------------------------------------------------------------------
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to create the git tag / release
    outputs:
      published: ${{ steps.check.outputs.publish }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Validate before release
        run: |
          npm run typecheck
          npm test

      - name: Check whether this version is already published
        id: check
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          PUBLISHED="$(npm view "@leanchuck/core@$VERSION" version 2>/dev/null || true)"
          if [ -n "$PUBLISHED" ]; then
            echo "Version $VERSION already on npm — skipping publish."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version $VERSION not yet published — will publish."
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.check.outputs.publish == 'true'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag the release
        if: steps.check.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --generate-notes \
            --target "$GITHUB_SHA"
